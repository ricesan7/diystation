<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIYstation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      background: #f8fbff;
      color: #17243b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { text-decoration: none; color: inherit; }

    /* Header */
    header {
      background: #fff;
      border-bottom: 1px solid #e6edf5;
      padding: 0 24px;
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      color: #082a5b;
      letter-spacing: -.04em;
    }
    nav a {
      font-size: 14px;
      font-weight: 700;
      color: #082a5b;
      padding: 6px 14px;
      border-radius: 8px;
      transition: background .15s;
    }
    nav a:hover { background: #eef4ff; }

    /* Hero */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }
    .hero-inner {
      max-width: 640px;
      text-align: center;
    }
    .hero-inner h1 {
      font-size: clamp(36px, 6vw, 60px);
      font-weight: 900;
      color: #082a5b;
      letter-spacing: -.05em;
      line-height: 1.12;
      margin-bottom: 20px;
    }
    .hero-inner p {
      font-size: 17px;
      color: #42526b;
      line-height: 1.9;
      font-weight: 500;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      height: 52px;
      padding: 0 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 900;
      background: #082a5b;
      color: #fff;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 8px 24px rgba(8,42,91,.15);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(8,42,91,.20);
    }
    .btn svg {
      flex-shrink: 0;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: #8a97a8;
    }

    @media (max-width: 480px) {
      .hero { padding: 60px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">DIYstation</div>
      <nav>
        <a href="https://ricesan7.github.io/applist/" target="_blank">アプリ一覧</a>
      </nav>
    </div>
  </header>

  <main class="hero">
    <div class="hero-inner">
      <h1>DIYstation</h1>
      <p>自作アプリやツールをまとめています。<br>アプリの一覧・紹介はこちらからどうぞ。</p>
      <a class="btn" href="https://ricesan7.github.io/applist/" target="_blank">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        アプリ一覧を見る
      </a>
    </div>
  </main>

  <footer>
    &copy; 2025 DIYstation
  </footer>

</body>
</html>
